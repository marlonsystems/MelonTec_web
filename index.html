<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>W-PD Dispatch</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<header>W-PD Dispatch</header>
<main>
  <!-- Dispatch Panel -->
  <div class="panel">
    <h2>Manual Dispatch / Auto Assign</h2>
    <label for="unit-select">Select Unit:</label>
    <select id="unit-select"></select>
    <label for="call-select">Select Call:</label>
    <select id="call-select"></select>
    <button onclick="manualDispatch()">Dispatch Unit</button>
    <button id="auto-btn" onclick="toggleAutoDispatch()">Auto-Assign Calls: OFF</button>
  </div>

  <!-- Units Panel -->
  <div class="panel">
    <h2>Units</h2>
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Type</th>
          <th>Officer</th>
          <th>Status</th>
          <th>Current Call</th>
        </tr>
      </thead>
      <tbody id="unit-list"></tbody>
    </table>
  </div>

  <!-- Active Calls Panel -->
  <div class="panel">
    <h2>Active Calls</h2>
    <ul id="calls-list"></ul>
  </div>

  <!-- Map Panel -->
  <div class="panel">
    <h2>Map</h2>
    <div id="map"></div>
  </div>

  <!-- Chat Panel -->
  <div class="panel">
    <h2>Chat</h2>
    <div id="chat-box" class="chat-box"></div>
    <input id="chat-input" type="text" placeholder="Type message">
    <button onclick="sendChat()">Send</button>
  </div>
</main>

<script src="https://unpkg.com/leaflet@1.9.5/dist/leaflet.js"></script>
<script src="dispatch.js"></script>
</body>
</html>
